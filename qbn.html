<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秋功-题库</title>
    <link rel="stylesheet" href="./css/GlobalStyle.css?v=1.2.2">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", SimSun, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 1200px;
            margin: 0 auto;
        }

        /* 头部导航 */
        .header {
            color: #ffffff;
            height: 60px;
            line-height: 60px;
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-list {
            display: flex;
            gap: 35px;
        }

        .nav-item {
            cursor: pointer;
            font-size: 15px;
        }

        .nav-item a {
            color: inherit;
            text-decoration: none;
        }

        .nav-item:hover {
            text-decoration: underline;
        }

        /* 主体内容布局 */
        .main {
            flex: 1 0 auto;
            display: flex;
            gap: 30px;
            margin: 30px auto;
        }

        .left-box {
            width: 840px;
        }

        .right-box {
            width: 330px;
        }

        .title-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--joint-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .title {
            font-size: 17px;
            font-weight: 600;
            color: #222;
        }

        .intro {
            color: #666;
            line-height: 1.6;
        }

        /* 页脚 */
        .footer {
            margin-top: auto;
            padding: 16px 0;
        }
    </style>
</head>
<body>
    <div id="floatingBall" tabindex="0"></div>
    <div id="PageBackdrop"></div>
    <div id="NavSidebar" class="ca-gradient-surface">
        <div id="Navigater">
            <scan>
                <a href="/index.html" class="href">本站首页</a>
            </scan>
        </div>
        <br>
        <div id="Tool">
            <scan>
                <a href="/ca.html" class="href">排课表工具</a>
            </scan>
        </div>
        <br>
        <div id="Tool">
            <scan>
                <a href="/qbn.html" class="href">题库</a>
            </scan>
        </div>
        <br>
        <div id="News"></div>
        <div id="OtherLink"></div>
    </div>

    <!-- 顶部导航栏 -->
    <div class="header primary-bg">
        <div class="container">
            <div class="logo">秋功-农大工具站</div>
            <div class="nav-list">
                <div class="nav-item"><a href="/index.html">首页</a></div>
                <div class="nav-item"><a href="/qbn.html">题库</a></div>
                <div class="nav-item">联系作者</div>
            </div>
        </div>
    </div>

    <!-- 主体内容区域 -->
    <div class="main container">
        

        <!-- 左侧快捷入口：可复制粘贴 .dial-group 单元块向下堆叠 -->
        <div class="right-box">
            <div class="dial-group">
                <div class="dial-title">思政类</div>
                <div class="dial-grid">
                    <a href="./questionBank/sz/xgxz.html" class="dial-btn">习思想选择题</a>
                </div>
            </div>

            <div class="dial-group">
                <div class="dial-title">工院</div>
                <div class="dial-grid">
                    <a href="#" class="dial-btn">待补充</a>
                </div>
            </div>
        </div>
        <!-- 右侧目录 -->
        <div class="left-box surface-card">
            <div class="title-bar">
                <span class="title">目录</span>
            </div>
            <p class="intro">待补充</p>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer primary-bg text-white text-center">
        <div class="container">
            <p>秋功</p>
        </div>
    </div>

    <script src="./js/version-qbn.js?v=1.0.0"></script>
    <script src="./js/version-global.js?v=1.2.2"></script>
    <script src="./js/index.js?v=1.2.2"></script>
</body>
</html>
