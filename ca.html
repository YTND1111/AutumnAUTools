<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排课表工具</title>
    <link rel="stylesheet" href="./css/GlobalStyle.css">
    <style>
        :root {
            --joint-color: #0f7a47;
            --topbar-seam-light: #63bb86;
            --sidebar-bottom-light: #4db37b;
            --search-gap: 10px;
            --topbar-horizontal-padding: 16px;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --line-soft: rgba(28, 74, 55, 0.16);
            --danger: #cc2f2f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 18% 20%, #f4fff6 0%, #e8f8ee 45%, #e4f1ec 100%);
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            color: #183328;
        }

        #Topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 182px;
            overflow: visible;
            z-index: 30;
            padding-bottom: 8px;
        }

        .search-layer {
            position: fixed;
            top: 10px;
            left: var(--topbar-horizontal-padding);
            right: var(--topbar-horizontal-padding);
            z-index: 50;
        }

        #SearchRow {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr)) 140px 140px;
            gap: var(--search-gap);
            align-items: start;
        }

        .search-bar {
            position: relative;
            width: 100%;
            min-height: 40px;
            border-radius: 12px;
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.88) 0%, rgba(226, 247, 236, 0.82) 100%);
            padding: 8px;
            z-index: 1;
        }

        .search-bar:focus-within {
            z-index: 90;
        }

        .search-field {
            position: relative;
        }

        .search-input {
            width: 100%;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.58);
            border-radius: 12px;
            padding: 0 12px;
            font-size: 14px;
            color: #183328;
            background: transparent;
            outline: none;
            transition: box-shadow 0.2s ease;
        }

        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.28);
        }

        .suggestion-box {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            max-height: 260px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid rgba(43, 101, 73, 0.22);
            border-radius: 12px;
            box-shadow: 0 14px 28px rgba(9, 53, 38, 0.16);
            z-index: 120;
        }

        .suggestion-item {
            width: 100%;
            border: 0;
            background: transparent;
            text-align: left;
            padding: 10px 12px;
            color: #214435;
            cursor: pointer;
            font-size: 14px;
        }

        .suggestion-item:hover {
            background: rgba(0, 156, 18, 0.09);
        }

        .suggestion-empty {
            margin: 0;
            padding: 10px 12px;
            color: #4e6a5d;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }

        .is-hidden-preserve {
            visibility: hidden;
            pointer-events: none;
        }

        .search-field.has-clear .search-input {
            padding-right: 34px;
        }

        .input-clear-btn {
            position: absolute;
            top: 50%;
            right: 8px;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border: 1px solid rgba(22, 86, 60, 0.2);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            color: #2a5b47;
            font-size: 12px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
        }

        .input-clear-btn:hover {
            background: #eef9f3;
        }

        .action-btn {
            height: 40px;
            width: 140px;
            padding: 0 12px;
            border: 0;
            border-radius: 12px;
            background: linear-gradient(120deg, #165d3f 0%, #2f8a62 100%);
            color: #f1fff8;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 8px 18px rgba(18, 77, 54, 0.2);
        }

        .action-btn.is-active {
            background: linear-gradient(120deg, #2f8a62 0%, #0f7a47 100%);
        }

        #PlanCandidateArea {
            margin: 76px var(--topbar-horizontal-padding) 0;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 12px;
            padding: 8px;
            min-height: 42px;
            background: rgba(240, 255, 247, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .plan-pill {
            border: 1px solid rgba(210, 240, 225, 0.8);
            background: rgba(255, 255, 255, 0.86);
            color: #1e573f;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .plan-pill.is-active {
            border-color: #0f7a47;
            box-shadow: 0 0 0 2px rgba(15, 122, 71, 0.22);
        }

        .plan-empty {
            margin: 0;
            color: #f4fff9;
            font-size: 13px;
        }

        .plan-empty.is-error {
            color: #ffdfdf;
            font-weight: 700;
        }

        #Layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            gap: 14px;
            padding: 196px 14px 14px;
            min-height: 100vh;
        }

        #ScheduleSection {
            background: var(--panel-bg);
            border: 1px solid var(--line-soft);
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(10, 44, 30, 0.08);
            padding: 10px;
            backdrop-filter: blur(4px);
            overflow: auto;
            position: relative;
        }

        #ScheduleControlRow {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
            gap: 8px;
        }

        .dropdown-multi {
            position: relative;
            min-width: 210px;
        }

        .dropdown-multi.is-toolbar {
            min-width: 124px;
            flex: 0 0 124px;
        }

        .dropdown-multi > summary {
            list-style: none;
            border: 1px solid rgba(22, 91, 62, 0.24);
            border-radius: 8px;
            background: #ffffff;
            color: #1f5b41;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 10px;
            cursor: pointer;
        }

        .dropdown-multi.is-toolbar > summary {
            height: 26px;
            padding: 4px 8px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            width: 100%;
            justify-content: center;
        }

        .dropdown-multi > summary::-webkit-details-marker {
            display: none;
        }

        .dropdown-panel {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 260px;
            max-height: 260px;
            overflow-y: auto;
            border: 1px solid rgba(22, 91, 62, 0.24);
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 10px 20px rgba(13, 62, 44, 0.14);
            padding: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 15;
        }

        #ScheduleGrid {
            display: grid;
            grid-template-columns: 66px repeat(7, minmax(108px, 1fr));
            grid-template-rows: 40px repeat(12, 52px);
            min-width: 822px;
            border: 1px solid var(--line-soft);
            border-radius: 9px;
            overflow: hidden;
            background: #ffffff;
        }

        .grid-head,
        .grid-slot {
            border-right: 1px solid var(--line-soft);
            border-bottom: 1px solid var(--line-soft);
            padding: 6px;
        }

        .grid-head {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            background: linear-gradient(180deg, #e8f7ed 0%, #d8f0e1 100%);
            cursor: default;
            user-select: none;
        }

        .grid-head.is-blocked,
        .grid-slot.is-blocked {
            background: rgba(212, 33, 33, 0.16);
        }

        .grid-slot {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #fcfefd;
            cursor: default;
            transition: background-color 0.18s ease;
            overflow: visible;
            position: relative;
        }

        .grid-slot.is-pref-editable {
            cursor: pointer;
        }

        .slot-course {
            border-radius: 7px;
            border: 1px solid rgba(17, 110, 65, 0.28);
            background: rgba(14, 143, 85, 0.12);
            padding: 4px 6px;
            font-size: 11px;
            line-height: 1.35;
            cursor: pointer;
            overflow: visible;
            position: relative;
            z-index: 3;
        }

        .slot-course-title {
            font-weight: 700;
            color: #114831;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .slot-course-detail {
            margin-top: 0;
            max-height: 0;
            opacity: 0;
            transform: translateY(-4px);
            transform-origin: top;
            transition: max-height 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
            color: #2c624a;
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 2px);
            background: #f9fffc;
            border: 1px solid rgba(14, 90, 56, 0.2);
            border-radius: 6px;
            padding: 0 6px;
            box-shadow: 0 8px 14px rgba(15, 65, 46, 0.12);
            text-align: left;
            pointer-events: none;
            z-index: 6;
        }

        .slot-course.is-expanded .slot-course-detail {
            margin-top: 4px;
            max-height: 160px;
            opacity: 1;
            transform: translateY(0);
            padding: 6px;
            pointer-events: auto;
        }

        #Sidebar {
            position: sticky;
            top: 196px;
            height: calc(100vh - 210px);
            border-radius: 14px;
            border: 1px solid var(--line-soft);
            box-shadow: 0 8px 20px rgba(10, 44, 30, 0.08);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
        }

        .sidebar-title {
            margin: 0;
            font-size: 15px;
            font-weight: 800;
            color: #f4fff9;
        }

        .sidebar-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
        }

        .sidebar-head-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        #ModeTag {
            color: #f3fff9;
            font-size: 12px;
            opacity: 0.95;
        }

        #WeekFilter {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            max-height: 240px;
            overflow-y: auto;
        }

        .week-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border-radius: 999px;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #174a34;
            font-size: 11px;
        }

        .week-chip input {
            margin: 0;
        }

        #PoolToolbar {
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(249, 255, 251, 0.26);
            padding: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
            min-height: 40px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .pool-btn,
        .pool-check {
            border: 1px solid rgba(216, 240, 226, 0.6);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #1e573f;
            font-size: 11px;
            font-weight: 700;
            padding: 0 8px;
            cursor: pointer;
            line-height: 1.2;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .pool-check {
            align-items: center;
            gap: 4px;
        }

        .pool-btn-fixed {
            width: 88px;
        }

        .pool-btn-wide {
            width: 88px;
        }

        .pool-head-btn {
            width: 88px;
            height: 26px;
            border: 1px solid rgba(216, 240, 226, 0.6);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            color: #1e573f;
            font-size: 11px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            white-space: nowrap;
            padding: 0;
        }

        .pool-head-btn.is-hidden-preserve {
            visibility: hidden;
        }

        .pool-btn.is-active {
            border-color: #0f7a47;
            background: #e8f8ef;
        }

        #CandidatePool {
            min-height: 0;
            height: auto;
            overflow-y: auto;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(14, 90, 56, 0.2);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1 1 auto;
        }

        .empty-pool {
            margin: 0;
            font-size: 13px;
            color: #3f6756;
            padding: 6px;
        }

        .course-card,
        .class-group-card,
        .plan-course-card {
            border: 1px solid rgba(21, 95, 62, 0.24);
            border-radius: 10px;
            background: #f6fffa;
            padding: 9px;
        }

        .course-card.is-active,
        .class-group-card.is-active {
            border-color: #0f7a47;
            box-shadow: 0 0 0 2px rgba(15, 122, 71, 0.22);
            background: #e9f9f0;
        }

        .course-card.is-conflict,
        .class-group-card.is-conflict,
        .plan-course-card.is-conflict {
            border-color: var(--danger);
            box-shadow: 0 0 0 2px rgba(204, 47, 47, 0.18);
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 5px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 800;
            color: #154a34;
            margin: 0;
        }

        .danger-btn {
            border: 1px solid rgba(165, 30, 30, 0.5);
            border-radius: 7px;
            background: #fff2f2;
            color: #9e1e1e;
            font-size: 11px;
            font-weight: 700;
            padding: 0 7px;
            cursor: pointer;
            flex-shrink: 0;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            width: 56px;
        }

        .course-card-meta,
        .class-group-meta,
        .plan-card-meta {
            margin: 0;
            font-size: 12px;
            line-height: 1.45;
            color: #335b4c;
        }

        .conflict-message {
            margin: 6px 0 0;
            font-size: 11px;
            line-height: 1.4;
            color: #a62020;
            font-weight: 700;
        }

        .class-group-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        .class-group-actions {
            display: flex;
            gap: 6px;
        }

        .group-action-btn {
            border: 1px solid rgba(20, 103, 66, 0.3);
            border-radius: 8px;
            background: #f0fcf5;
            color: #1f5a41;
            font-size: 11px;
            font-weight: 700;
            padding: 0 7px;
            cursor: pointer;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            width: 78px;
        }

        .class-group-list {
            border-top: 1px dashed rgba(33, 91, 64, 0.2);
            padding-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
            overflow-y: auto;
        }

        .class-group-course-item {
            border: 1px solid rgba(20, 103, 66, 0.22);
            border-radius: 8px;
            background: #ffffff;
            text-align: left;
            padding: 7px;
            cursor: pointer;
        }

        .class-group-course-item.is-off {
            opacity: 0.5;
            background: #f3f6f4;
        }

        .class-group-course-title {
            font-size: 12px;
            color: #194933;
            font-weight: 700;
        }

        .class-group-course-meta {
            margin-top: 2px;
            font-size: 11px;
            color: #44695a;
        }

        .plan-filter-row {
            margin-top: 6px;
            border-top: 1px dashed rgba(20, 83, 59, 0.22);
            padding-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .plan-filter-title {
            font-size: 11px;
            font-weight: 700;
            color: #205740;
        }

        .plan-filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .plan-filter-options label {
            font-size: 11px;
            background: #ffffff;
            border: 1px solid rgba(27, 89, 63, 0.2);
            border-radius: 8px;
            padding: 2px 6px;
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }

        #SoftToast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%) translateY(10px);
            min-width: 240px;
            max-width: 420px;
            background: rgba(20, 57, 42, 0.95);
            color: #f6fff9;
            border: 1px solid rgba(209, 241, 224, 0.3);
            border-radius: 10px;
            box-shadow: 0 12px 24px rgba(9, 44, 31, 0.24);
            padding: 10px 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 180;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        #SoftToast.is-show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 1120px) {
            #SearchRow {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            #Layout {
                grid-template-columns: 1fr;
            }

            #Sidebar {
                position: static;
                height: 480px;
            }
        }

        @media (max-width: 760px) {
            #Topbar {
                min-height: 260px;
            }

            .search-layer {
                left: 10px;
                right: 10px;
            }

            #SearchRow {
                grid-template-columns: 1fr;
            }

            .action-btn {
                width: 140px;
            }

            #Layout {
                padding-top: 280px;
            }
        }
    </style>
</head>
<body>
    <div id="Topbar" class="ca-gradient-surface">
        <div id="PrimarySearchLayer" class="search-layer">
            <div id="SearchRow">
                <div id="CourseSearchBar" class="search-bar">
                    <div class="search-field has-clear">
                        <input id="CourseSearchInput" class="search-input" type="text" placeholder="课程检索：课程编号或课程名称" autocomplete="off">
                        <button id="CourseSearchClear" class="input-clear-btn" type="button" aria-label="清空课程检索">x</button>
                        <div id="CourseSuggestionBox" class="suggestion-box hidden"></div>
                    </div>
                </div>
                <div id="TeacherSearchBar" class="search-bar">
                    <div class="search-field has-clear">
                        <input id="TeacherSearchInput" class="search-input" type="text" placeholder="授课教师检索" autocomplete="off">
                        <button id="TeacherSearchClear" class="input-clear-btn" type="button" aria-label="清空教师检索">x</button>
                        <div id="TeacherSuggestionBox" class="suggestion-box hidden"></div>
                    </div>
                </div>
                <div id="TimeSearchBar" class="search-bar">
                    <div class="search-field has-clear">
                        <input id="TimeSearchInput" class="search-input" type="text" placeholder="上课时间检索" autocomplete="off">
                        <button id="TimeSearchClear" class="input-clear-btn" type="button" aria-label="清空时间检索">x</button>
                        <div id="TimeSuggestionBox" class="suggestion-box hidden"></div>
                    </div>
                </div>
                <div id="ClassSearchBar" class="search-bar">
                    <div class="search-field has-clear">
                        <input id="ClassSearchInput" class="search-input" type="text" placeholder="班级检索：可按班级或课程关键词" autocomplete="off">
                        <button id="ClassSearchClear" class="input-clear-btn" type="button" aria-label="清空班级检索">x</button>
                        <div id="ClassSuggestionBox" class="suggestion-box hidden"></div>
                    </div>
                </div>
                <button id="ClassModeToggleButton" class="action-btn" type="button">调用班级课表</button>
                <button id="ScheduleModeToggleButton" class="action-btn" type="button">切换到自助方案排课</button>
            </div>
        </div>
        <div id="PlanCandidateArea" class="hidden"></div>
    </div>

    <main id="Layout">
        <section id="ScheduleSection">
            <div id="ScheduleControlRow">
                <details id="WeekMultiDropdown" class="dropdown-multi">
                    <summary id="WeekSummary">周次筛选：全部</summary>
                    <div id="WeekFilter" class="dropdown-panel"></div>
                </details>
            </div>
            <div id="ScheduleGrid"></div>
        </section>
        <aside id="Sidebar" class="ca-gradient-surface">
            <div class="sidebar-head">
                <h2 class="sidebar-title">候选课程卡片池</h2>
                <div class="sidebar-head-actions">
                    <button id="GeneratePlanTopButton" class="pool-head-btn is-hidden-preserve" type="button">生成方案</button>
                    <button id="ClearPoolTopButton" class="pool-head-btn" type="button">清空卡池</button>
                </div>
            </div>
            <div id="ModeTag">当前模式：自由排课</div>
            <div id="PoolToolbar"></div>
            <div id="CandidatePool">
                <p class="empty-pool">从顶部搜索框选择课程后，将在此生成候选课程卡片。</p>
            </div>
        </aside>
    </main>

    <div id="SoftToast" role="status" aria-live="polite"></div>

    <script src="./js/CourseArrangement.js"></script>
</body>
</html>
