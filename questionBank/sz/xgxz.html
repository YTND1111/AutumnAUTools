<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .is-hidden {
            display: none !important;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f3ff 50%, #fef9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            color: #1f2933;
        }

        button {
            font-family: inherit;
        }

        button:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.4);
            outline-offset: 3px;
        }

        .app-shell {
            width: min(960px, 100%);
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.12);
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .app-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .app-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
        }

        .subtitle {
            margin: 4px 0 0;
            color: #64748b;
            font-size: 15px;
        }

        .header-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: #1f2933;
            cursor: pointer;
        }

        .toggle input {
            width: 18px;
            height: 18px;
            accent-color: #2563eb;
        }

        .header-controls button {
            background: #f1f5f9;
            border: none;
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 600;
            color: #0f172a;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .header-controls button:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .header-controls button:disabled {
            cursor: default;
            opacity: 0.65;
            transform: none;
        }

        .question-card {
            background: #f8fbff;
            border-radius: 18px;
            padding: 24px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #2563eb;
            font-weight: 600;
            font-size: 16px;
        }

        #modeHint {
            font-weight: 500;
            color: #22c55e;
            font-size: 14px;
        }

        .wrong-panel {
            background: #f9fafb;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.2s ease;
        }

        .wrong-panel.is-hidden {
            display: none;
        }

        .wrong-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .wrong-panel-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }

        .wrong-empty {
            margin: 0;
            color: #64748b;
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
        }

        .wrong-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .wrong-item {
            padding: 16px;
            border-radius: 14px;
            border: 1px solid rgba(99, 102, 241, 0.18);
            background: #eef2ff;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            align-items: flex-start;
        }

        .wrong-item__info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: min(100%, 520px);
        }

        .wrong-item__title {
            margin: 0;
            font-weight: 600;
            color: #312e81;
            font-size: 16px;
        }

        .wrong-item__desc {
            margin: 0;
            color: #4338ca;
            font-size: 14px;
            line-height: 1.5;
        }

        .review-btn {
            border: none;
            border-radius: 999px;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
            background: #bae6fd;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .review-btn:hover {
            background: #7dd3fc;
            transform: translateY(-1px);
        }

        #clearWrongRecords {
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            color: #b91c1c;
            background: #fee2e2;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #clearWrongRecords:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 16px rgba(248, 113, 113, 0.2);
        }

        .question-text {
            margin: 0;
            line-height: 1.6;
            font-size: 20px;
            color: #0f172a;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        @media (min-width: 720px) {
            .options {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid #d0d8e5;
            background: #ffffff;
            font-size: 16px;
            text-align: left;
            line-height: 1.5;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
            cursor: pointer;
        }

        .option .badge {
            flex: 0 0 auto;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #eff6ff;
            color: #2563eb;
            display: grid;
            place-items: center;
            font-weight: 700;
        }

        .option .content {
            flex: 1;
            color: #1f2933;
        }

        .option:hover {
            border-color: #2563eb;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.12);
            transform: translateY(-1px);
        }

        .option.is-selected {
            border-color: #2563eb;
            background: #eef2ff;
            box-shadow: 0 10px 18px rgba(79, 70, 229, 0.12);
        }

        .option.is-correct {
            border-color: #16a34a;
            background: #f0fdf4;
            color: #166534;
        }

        .option.is-correct .badge {
            background: #dcfce7;
            color: #15803d;
        }

        .option.is-wrong {
            border-color: #dc2626;
            background: #fef2f2;
            color: #b91c1c;
        }

        .option.is-wrong .badge {
            background: #fee2e2;
            color: #b91c1c;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .actions button {
            min-width: 120px;
            padding: 12px 18px;
            border-radius: 999px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            color: #ffffff;
            background: linear-gradient(135deg, #2563eb, #4c6ef5);
        }

        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
        }

        .actions button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #getBack {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        }

        #getBack:hover {
            box-shadow: 0 12px 24px rgba(14, 165, 233, 0.2);
        }

        #checkAnswer {
            background: linear-gradient(135deg, #ec4899, #f97316);
        }

        #checkAnswer:hover {
            box-shadow: 0 12px 24px rgba(236, 72, 153, 0.2);
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <header class="app-header">
            <div>
                <h1>习概选择题练习</h1>
                <p class="subtitle">随时巩固习近平新时代中国特色社会主义思想重点知识</p>
            </div>
            <div class="header-controls">
                <label class="toggle">
                    <input type="checkbox" id="shuffleToggle">
                    <span>随机打乱题序</span>
                </label>
                <button type="button" id="toggleWrongPanel" disabled>错题记录 (0)</button>
                <button type="button" id="resetProgress">清除当前选项</button>
            </div>
        </header>
        <section class="question-card">
            <div class="question-meta">
                <span id="progress"></span>
                <span id="modeHint"></span>
            </div>
            <p class="question-text" id="questionText"></p>
            <div class="options">
                <button class="option" type="button" data-index="0">
                    <span class="badge">A</span>
                    <span class="content"></span>
                </button>
                <button class="option" type="button" data-index="1">
                    <span class="badge">B</span>
                    <span class="content"></span>
                </button>
                <button class="option" type="button" data-index="2">
                    <span class="badge">C</span>
                    <span class="content"></span>
                </button>
                <button class="option" type="button" data-index="3">
                    <span class="badge">D</span>
                    <span class="content"></span>
                </button>
            </div>
        </section>
        <footer class="actions">
            <button type="button" id="getBack">上一题</button>
            <button type="button" id="checkAnswer">查看答案</button>
            <button type="button" id="continue">下一题</button>
        </footer>
        <section class="wrong-panel is-hidden" id="wrongPanel">
            <div class="wrong-panel-header">
                <h2>错题记录</h2>
                <button type="button" id="clearWrongRecords">清空错题</button>
            </div>
            <p class="wrong-empty" id="wrongEmpty">目前还没有错题，保持住！</p>
            <ul class="wrong-list" id="wrongList"></ul>
        </section>
    </div>
    <script>

        //变量初始化

        const data = 
            [
                {
                    stem: "1.党的二十大提出的（   ），是习近平新时代中国特色社会主义思想的世界观、方法论和贯穿其中的立场观点方法的重要体现。",
                    options: {
                        A: "“三个务必”",
                        B: "“六个必须坚持”",
                        C: "“五个必由之路”",
                        D: "中国式现代化"
                    }
                },
                {
                    stem: "2.（   ）是中国共产党人的境界格局，体现了马克思主义追求人类进步和解放的崇高理想。",
                    options: {
                        A: "坚持胸怀天下",
                        B: "坚持守正创新",
                        C: "坚持问题导向",
                        D: "坚持系统观念"
                    }
                },
                {
                    stem: "3.习近平新时代中国特色社会主义思想内容十分丰富，涵盖改革发展稳定、内政外交国防、治党治国治军等各个领域、各个方面，构成了一个系统完整、逻辑严密、相互贯通的思想理论体系。习近平新时代中国特色社会主义思想的主体内容是（   ）。",
                    options: {
                        A: "“四个全面”",
                        B: "“十四个坚持”",
                        C: "“十个明确”",
                        D: "“四个伟大”"
                    }
                },
                {
                    stem: "4.中国特色社会主义的战略布局是（   ）。",
                    options: {
                        A: "“十个明确”",
                        B: "“十四个坚持”",
                        C: "“四个全面”",
                        D: "“五位一体”"
                    }
                },
                {
                    stem: "5.世界未有之大变局正在加速演变。（   ）仍然是时代主题，但是不稳定不确定性更加突出。",
                    options: {
                        A: "发展与共享",
                        B: "和平与融合",
                        C: "开放与包容",
                        D: "和平与发展"
                    }
                },
                {
                    stem: "6.马克思主义中国化时代化的最新成果是（   ）。",
                    options: {
                        A: "习近平新时代中国特色社会主义思想",
                        B: "毛泽东思想",
                        C: "邓小平理论",
                        D: "“三个代表”重要思想"
                    }
                },
                {
                    stem: "7.进入新时代的重要依据是（   ）。",
                    options: {
                        A: "发展不平衡",
                        B: "社会主要矛盾变化",
                        C: "发展不充分",
                        D: "社会基本矛盾变化"
                    }
                },
                {
                    stem: "8.提出人与自然和谐共生的生命共同体，绿水青山就是金山银山，是对（   ）的新发展。",
                    options: {
                        A: "马克思主义自然观",
                        B: "马克思主义社会矛盾学说",
                        C: "马克思主义认识论",
                        D: "马克思主义国家学说"
                    }
                },
                {
                    stem: "9.新时代十年的伟大变革，在党史、新中国史、改革开放史、社会主义发展史、（   ）上具有里程碑意义。",
                    options: {
                        A: "共和国史",
                        B: "中华民族发展史",
                        C: "人类文明发展史",
                        D: "社会主义建设史"
                    }
                },
                {
                    stem: "10.三大时代课题是理解习近平新时代中国特色社会主义思想的“理论之眼”，其中（   ）回答的是方向性问题。",
                    options: {
                        A: "新时代坚持和发展什么样的社会主义、怎样坚持和发展社会主义",
                        B: "新时代坚持和发展什么样的中国特色社会主义、怎样坚持和发展中国特色社会主义",
                        C: "建设什么样的社会主义现代化强国、怎样建设社会主义现代化强国",
                        D: "建设什么样的长期执政的马克思主义政党、怎样建设长期执政的马克思主义政党"
                    }
                },
                {
                    stem: "11.改革开放以来我们取得一切成绩和进步的根本原因，归结起来就是：开辟了中国特色社会主义道路，形成了中国特色社会主义理论体系，确立了中国特色社会主义制度，发展了中国特色社会主义文化。其中，中国特色社会主义道路是（ ）。",
                    options: {
                        A: "根本保障",
                        B: "行动指南",
                        C: "实现途径",
                        D: "精神力量"
                    }
                },
                {
                    stem: "12.（   ）吸收了“协和万邦”“天下一家”的和合智慧。",
                    options: {
                        A: "坚持以人民为中心",
                        B: "全面深化改革",
                        C: "人与自然和谐共生",
                        D: "推动构建人类命运共同体"
                    }
                },
                {
                    stem: "13.中国特色社会主义进入新时代，我国社会主要矛盾已经转化为人民日益增长的____需要和____的发展之间的矛盾。",
                    options: {
                        A: "美好生活、不充分不平衡",
                        B: "幸福生活、不平衡不充分",
                        C: "幸福生活、不充分不平衡",
                        D: "美好生活、不平衡不充分"
                    }
                },
                {
                    stem: "14.必须认识到，我国社会主要矛盾的变化，没有改变我们对我国社会主义所处历史阶段的判断，我国仍处于并将长期处于（   ）的基本国情没有变，我国是世界最大发展中国家的国际地位没有变。",
                    options: {
                        A: "社会主义阶段",
                        B: "社会主义初级阶段",
                        C: "社会主义中级阶段",
                        D: "社会主义高级阶段"
                    }
                },
                {
                    stem: "15.（   ）是更基础、更广泛、更深厚的自信，是一个国家、一个民族发展中最基本、最深沉、最持久的力量。",
                    options: {
                        A: "道路自信",
                        B: "理论自信",
                        C: "制度自信",
                        D: "文化自信"
                    }
                },
                {
                    stem: "16.（   ）是我国发展新的历史方位，标志着中国特色社会主义事业进入了新的发展阶段。",
                    options: {
                        A: "新时代",
                        B: "新阶段",
                        C: "新发展",
                        D: "新时期"
                    }
                },
                {
                    stem: "17.（   ）是国家的生命线、人民的幸福线。",
                    options: {
                        A: "党的基本路线",
                        B: "党的基本方略",
                        C: "党的基本理论",
                        D: "党的群众路线"
                    }
                },
                {
                    stem: "18.新时代新征程中国共产党的中心任务，就是团结带领全国各族人民（   ）、实现第二个百年奋斗目标，以中国式现代化全面推进中华民族伟大复兴。",
                    options: {
                        A: "全面建成小康社会",
                        B: "全面建设现代化强国",
                        C: "全面建成社会主义现代化强国",
                        D: "基本实现现代化"
                    }
                },
                {
                    stem: "19.（   ）是近代以来中国人民的共同梦想，是中国共产党矢志不渝的奋斗目标。",
                    options: {
                        A: "社会主义现代化建设",
                        B: "中国特色社会主义",
                        C: "国家富强民族振兴",
                        D: "实现中华民族伟大复兴"
                    }
                },
                {
                    stem: "20.中国式现代化既基于自身国情、又借鉴各国经验，既传承历史文化、又融合现代文明，是具有中国特色、符合中国实际的现代化，是强国建设、民族复兴的唯一正确道路。中国式现代化区别于西方现代化的显著标志是（   ）。",
                    options: {
                        A: "全体人民共同富裕",
                        B: "人口规模巨大",
                        C: "物质文明和精神文明相协调",
                        D: "人与自然和谐共生"
                    }
                },
                {
                    stem: "21.中国特色社会主义最本质的特征是（   ）。",
                    options: {
                        A: "中国共产党的领导",
                        C: "中国特色社会主义",
                        B: "社会主义初级阶段",
                        D: "人民为中心"
                    }
                },
                {
                    stem: "22.共同富裕是社会主义的本质要求，是中国式现代化的重要特征。党的十九届五中全会对扎实推动共同富裕作出了重大战略部署，明确提出了推动共同富裕的2035年远景目标，这一目标是（   ）。",
                    options: {
                        A: "全体人民共同富裕基本实现",
                        B: "全体人民共同富裕取得更为明显的实质性进展",
                        C: "全体人民共同富裕全面实现",
                        D: "全体人民共同富裕同步实现"
                    }
                },
                {
                    stem: "23.习近平总书记在中国共产党与世界政党高层对话会上的主旨讲话指出：一个国家走向现代化，既要（   ），更要立足本国国情，具有本国特色。",
                    options: {
                        A: "促进物质文明与精神文明协调发展",
                        B: "实现人与自然和谐共生",
                        C: "推动全体人民共同富裕",
                        D: "遵循现代化一般规律"
                    }
                },
                {
                    stem: "24.中国的现代化建设不能完全照搬西方国家的现代化模式。这是因为独特的（   ）共同决定中国必然走适合自己特点的现代化道路。",
                    options: {
                        A: "伦理、道德、习俗",
                        B: "法律、哲学、文明",
                        C: "习俗、文化、制度",
                        D: "文化传统、历史命运、基本国情"
                    }
                },
                {
                    stem: "25.（   ）把我国建成富强民主文明和谐美丽的社会主义现代化强国。",
                    options: {
                        A: "从2020年到2035年",
                        B: "从2020年到2045年",
                        C: "从2035年到2050年",
                        D: "从2035年到本世纪中叶"
                    }
                },
                {
                    stem: "26.（   ）是中国特色社会主义制度的最大优势，是党和国家各项事业发展的根本政治保证。",
                    options: {
                        A: "党的作用",
                        B: "党的地位",
                        C: "党的形象",
                        D: "党的领导"
                    }
                },
                {
                    stem: "27.维护（   ），是一个成熟的马克思主义执政党的重大建党原则。",
                    options: {
                        A: "中国特色社会主义制度",

        const answerKeyString = "2133412122344241134112444444221144121113223111111141311114442344134424133222121223114322131413111232131323412333133341321342122141144422333132122441433";

        const totalQuestions = data.length;
        const baseOrder = Array.from({ length: totalQuestions }, (_, index) => index);
        let questionOrder = [...baseOrder];
        let currentIndex = 0;
        let selectedOptionIndex = null;
        let isAnswered = false;
        const wrongQuestions = new Map();

        const questionText = document.getElementById('questionText');
        const progressIndicator = document.getElementById('progress');
        const modeHint = document.getElementById('modeHint');
        const optionButtons = Array.from(document.querySelectorAll('.option'));
        const nextBtn = document.getElementById('continue');

        const checkBtn = document.getElementById('checkAnswer');
        const shuffleToggle = document.getElementById('shuffleToggle');
        const resetBtn = document.getElementById('resetProgress');
        const wrongToggleBtn = document.getElementById('toggleWrongPanel');
        const wrongPanel = document.getElementById('wrongPanel');
        const wrongList = document.getElementById('wrongList');
        const wrongEmpty = document.getElementById('wrongEmpty');
        const clearWrongBtn = document.getElementById('clearWrongRecords');

        function clearOptionStyles() {
            optionButtons.forEach((button) => {
                button.classList.remove('is-selected', 'is-correct', 'is-wrong');
            });
        }

        function resetSelectionState() {
            selectedOptionIndex = null;
            isAnswered = false;
            clearOptionStyles();
        }

        function updateStatusLine() {
            const effectiveIndex = questionOrder[currentIndex];
            const messages = [];
            if (shuffleToggle.checked) {
                messages.push('随机模式开启');
            }
            if (wrongQuestions.has(effectiveIndex)) {
                messages.push('本题在错题集中');
            }
            modeHint.textContent = messages.join(' · ');
        }

        function renderQuestion() {
            const effectiveIndex = questionOrder[currentIndex];
            const current = data[effectiveIndex];
            questionText.innerText = current.stem;
            optionButtons.forEach((button, idx) => {
                const label = String.fromCharCode(65 + idx);
                button.querySelector('.badge').innerText = label;
                button.querySelector('.content').innerText = current.options[label];
            });
            resetSelectionState();
            updateStatusLine();
            updateNavigation();
        }

        function updateNavigation() {
            progressIndicator.innerText = `第${currentIndex + 1} / ${totalQuestions} 题`;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === totalQuestions - 1;
        }

        optionButtons.forEach((button, idx) => {
            button.addEventListener('click', () => {
                if (isAnswered) {
                    return;
                }
                if (selectedOptionIndex === idx) {
                    button.classList.remove('is-selected');
                    selectedOptionIndex = null;
                    return;
                }
                selectedOptionIndex = idx;
                optionButtons.forEach((btn) => btn.classList.remove('is-selected'));
                button.classList.add('is-selected');
            });
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < totalQuestions - 1) {
                currentIndex += 1;
                renderQuestion();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex -= 1;
                renderQuestion();
            }
        });

        checkBtn.addEventListener('click', () => {
            const effectiveIndex = questionOrder[currentIndex];
            const current = data[effectiveIndex];
            const answerValue = answerKey[effectiveIndex];
            if (!answerValue) {
                return;
            }
            const correctIndex = Number(answerValue) - 1;
            optionButtons.forEach((button) => button.classList.remove('is-correct', 'is-wrong'));
            if (selectedOptionIndex === null) {
                optionButtons[correctIndex].classList.add('is-correct');
                isAnswered = true;
                return;
            }
            const selectedLabel = String.fromCharCode(65 + selectedOptionIndex);
            const correctLabel = String.fromCharCode(65 + correctIndex);
            if (selectedOptionIndex === correctIndex) {
                optionButtons[correctIndex].classList.add('is-correct');
                wrongQuestions.delete(effectiveIndex);
            } else {
                optionButtons[selectedOptionIndex].classList.add('is-wrong');
                optionButtons[correctIndex].classList.add('is-correct');
                wrongQuestions.set(effectiveIndex, {
                    questionIndex: effectiveIndex,
                    questionNumber: effectiveIndex + 1,
                    stem: current.stem,
                    selected: selectedLabel,
                    correct: correctLabel
                });
            }
            isAnswered = true;
            updateStatusLine();
            updateWrongPanel();
        });

        shuffleToggle.addEventListener('change', () => {
            questionOrder = shuffleToggle.checked ? shuffleArray(baseOrder) : [...baseOrder];
            currentIndex = 0;
            renderQuestion();
            updateWrongPanel();
        });

        resetBtn.addEventListener('click', () => {
            resetSelectionState();
        });

        wrongToggleBtn.addEventListener('click', () => {
            if (wrongQuestions.size === 0) {
                return;
            }
            wrongPanel.classList.toggle('is-hidden');
        });

        clearWrongBtn.addEventListener('click', () => {
            wrongQuestions.clear();
            wrongPanel.classList.add('is-hidden');
            updateWrongPanel();
            updateStatusLine();
        });

        function updateWrongPanel() {
            const count = wrongQuestions.size;
            wrongToggleBtn.textContent = `错题记录 (${count})`;
            wrongToggleBtn.disabled = count === 0;
            if (count === 0) {
                wrongPanel.classList.add('is-hidden');
                wrongEmpty.classList.remove('is-hidden');
                wrongList.innerHTML = '';
                return;
            }
            wrongEmpty.classList.add('is-hidden');
            const fragment = document.createDocumentFragment();
            const ordered = Array.from(wrongQuestions.values()).sort((a, b) => a.questionNumber - b.questionNumber);
            ordered.forEach((item) => {
                const listItem = document.createElement('li');
                listItem.className = 'wrong-item';

                const info = document.createElement('div');
                info.className = 'wrong-item__info';

                const title = document.createElement('p');
                title.className = 'wrong-item__title';
                title.textContent = `第 ${item.questionNumber} 题`;

                const desc = document.createElement('p');
                desc.className = 'wrong-item__desc';
                desc.textContent = `你的选择：${item.selected} ，正确答案：${item.correct}`;

                info.appendChild(title);
                info.appendChild(desc);

                const reviewButton = document.createElement('button');
                reviewButton.type = 'button';
                reviewButton.className = 'review-btn';
                reviewButton.textContent = '前往复习';
                reviewButton.addEventListener('click', () => {
                    const targetIndex = questionOrder.indexOf(item.questionIndex);
                    if (targetIndex !== -1) {
                        currentIndex = targetIndex;
                        renderQuestion();
                        wrongPanel.classList.add('is-hidden');
                    }
                });

                listItem.appendChild(info);
                listItem.appendChild(reviewButton);
                fragment.appendChild(listItem);
            });
            wrongList.innerHTML = '';
            wrongList.appendChild(fragment);
        }

        function shuffleArray(source) {
            const result = [...source];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        renderQuestion();
        updateWrongPanel();
    </script>
